.app{display:flex;flex-direction:column;min-height:100vh;}
.app-hdr{display:flex;align-items:center;gap:16px;background:#1A3A5C;color:white;padding:10px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.app-emoji{font-size:26px;}
.app-name{font-size:16px;font-weight:700;}

.nav-b{background:rgba(255,255,255,.12);border:none;color:white;padding:7px 13px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .15s;white-space:nowrap;}

.nav-a{background:#2E6DA4!important;font-weight:700;}
.reset-b{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:white;padding:6px 11px;border-radius:6px;cursor:pointer;font-size:12px;margin-left:8px;}

.page{max-width:1400px;margin:0 auto;}

.tc-val{font-size:13px;font-weight:700;color:#1A3A5C;}

.th-l{text-align:left!important;}
.lt td{padding:7px 10px;text-align:center;border-bottom:1px solid #e8edf2;}

.lr-me td{background:#fffbea;}

.td-stat{white-space:nowrap;}
.rk{font-size:10px;margin-left:3px;font-weight:700;}
.table-hint{font-size:11px;color:#888;margin-top:5px;text-align:right;padding:4px;}
.msg{padding:10px 16px;border-radius:6px;margin-bottom:14px;font-weight:600;font-size:14px;}
.msg-ok{background:#d4edda;color:#1a5c30;border:1px solid #a8d5b5;}
.msg-err{background:#fde8e8;color:#c0392b;border:1px solid #f5b5b5;}
.addpick-page{max-width:740px;}
.addpick-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;background:white;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:16px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:11px;font-weight:700;color:#1A3A5C;text-transform:uppercase;letter-spacing:.5px;}
.fg select,.fg input[type=text]{padding:9px 12px;border:1.5px solid #d0d8e4;border-radius:6px;font-size:14px;background:white;color:#1a2a3a;outline:none;transition:border-color .15s;width:100%;}
.fg select:focus,.fg input:focus{border-color:#2E6DA4;}
.fg select:disabled{opacity:.5;cursor:not-allowed;}
.field-hint{font-size:11px;color:#888;}
.search-fg{position:relative;grid-column:1/-1;}
.search-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;border:1.5px solid #2E6DA4;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:200;list-style:none;max-height:280px;overflow-y:auto;}
.search-drop li{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;border-bottom:1px solid #f0f0f0;transition:background .1s;}
.search-drop li:hover{background:#f0f5fb;}
.search-drop li:last-child{border:none;}
.type-pip{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;}
.type-pip.hitter{background:#dbeafe;color:#1e40af;}
.type-pip.pitcher{background:#dcfce7;color:#166534;}
.res-name{flex:1;font-weight:600;font-size:13px;}
.res-team{font-size:12px;color:#666;width:38px;}
.res-val{font-size:11px;font-weight:700;width:52px;text-align:right;}
.res-adp{font-size:11px;color:#888;width:65px;text-align:right;}
.cost-wrap{display:flex;align-items:center;border:1.5px solid #d0d8e4;border-radius:6px;overflow:hidden;}
.dollar{padding:9px 10px;background:#f5f7fa;color:#555;font-weight:700;border-right:1px solid #d0d8e4;}
.cost-inp{flex:1;padding:9px 10px;border:none;font-size:14px;outline:none;width:100%;}
.add-btn{grid-column:1/-1;padding:12px;background:#1A3A5C;color:white;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;}
.add-btn:hover:not(:disabled){background:#2E6DA4;}
.add-btn:disabled{opacity:.4;cursor:not-allowed;}
.proj-card{background:white;border-radius:10px;padding:14px 18px;box-shadow:0 2px 8px rgba(0,0,0,.1);border-left:4px solid #2E6DA4;}
.proj-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.proj-name{font-size:17px;font-weight:700;color:#1A3A5C;}
.proj-mlb{font-size:12px;color:#666;background:#f0f4f8;padding:2px 8px;border-radius:4px;}
.proj-type{font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;}
.proj-type.hitter{background:#dbeafe;color:#1e40af;}
.proj-type.pitcher{background:#dcfce7;color:#166534;}
.val-badge{display:flex;align-items:center;gap:5px;background:#f0fff4;border:1px solid #a8d5b5;border-radius:6px;padding:4px 10px;margin-left:auto;}
.val-badge-label{font-size:10px;color:#2d8a4e;font-weight:700;text-transform:uppercase;}
.val-badge-num{font-size:18px;font-weight:700;color:#1a5c30;}
.val-badge-kp{font-size:11px;color:#666;}
.val-badge-warn{background:#fff8e6;border-color:#fde68a;}
.val-badge-warn .val-badge-label{color:#92400e;}
.val-badge-warn .val-badge-num{color:#92400e;}
.proj-stats{display:flex;gap:10px;flex-wrap:wrap;}
.ps{display:flex;flex-direction:column;align-items:center;background:#f5f7fa;border-radius:6px;padding:8px 12px;min-width:52px;}
.ps-l{font-size:10px;color:#666;font-weight:700;text-transform:uppercase;}
.ps-v{font-size:18px;font-weight:700;color:#1A3A5C;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.modal{background:white;border-radius:12px;width:100%;max-width:980px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-hdr{display:flex;align-items:center;padding:14px 20px;color:white;flex-shrink:0;}
.modal-hdr h2{font-size:17px;font-weight:700;flex:1;}
.modal-meta{display:flex;gap:8px;margin-right:10px;flex-wrap:wrap;}

.mbud-low{background:rgba(180,40,40,.7)!important;}
.mpicks{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;font-size:12px;}
.close-x{background:rgba(255,255,255,.2);border:none;color:white;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.close-x:hover{background:rgba(255,255,255,.35);}
.modal-body{overflow-y:auto;padding:16px 20px;flex:1;}
.stat-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:12px;}
.sc{background:#f5f7fa;border-radius:8px;padding:8px 6px;text-align:center;}

.sc-val{font-size:16px;font-weight:700;margin:3px 0 1px;}

.ob-label{font-size:12px;font-weight:700;color:#92400e;}
.ob-chip{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;}
.ob-active{background:#fef3c7;color:#92400e;}
.ob-bn{background:#e0e0e0;color:#666;}

  .nav-b{padding:6px 9px;font-size:12px;}
}
</style>

const INITIAL_ROSTERS = {"BuffDudes":[],"Sarge":[],"KShea":[],"Gammons":[],"Hawks Nest":[],"TuneSquad":[],"Killer Ps":[],"Spitztoon":[],"Squids":[],"Reclamation Project":[],"Kwan":[],"Choo Lee The Best":[]};

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const TEAMS = ['BuffDudes','Sarge','KShea','Gammons','Hawks Nest','TuneSquad',
               'Killer Ps','Spitztoon','Squids','Reclamation Project','Kwan','Choo Lee The Best'];
const MY_TEAM = 'BuffDudes';
const BUDGET = 260;
const SLOT_MAX = {C:2,'1B':1,'2B':1,SS:1,'3B':1,MI:1,CI:1,OF:5,UT:1,P:9};
const HITTER_SLOTS = ['C','1B','2B','SS','3B','MI','CI','OF','UT'];
const PITCHER_SLOTS = ['P'];
const ALL_SLOTS = Object.keys(SLOT_MAX);
const TARGETS = {BA:0.253,HR:250,RBI:860,SB:145,ERA:3.55,W:72,SV:56,WHIP:1.16};
const STORAGE_KEY = 'al_draft_2026_v4';

function norm(name) {
  if (!name) return '';
  return name.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/['.,-]/g,'').replace(/\s+/g,' ').trim();
}

const ALL_PLAYERS = [...HITTERS, ...PITCHERS];
const PMAP = new Map(ALL_PLAYERS.map(p => [norm(p.name), p]));

function lookup(name) {
  if (!name) return null;
  const n = norm(name);
  if (PMAP.has(n)) return PMAP.get(n);
  for (const [k, p] of PMAP) {
    const parts = n.split(' ').filter(w => w.length > 2);
    if (parts.length >= 2 && parts.every(pt => k.includes(pt))) return p;
  }
  return null;
}

function calcStats(picks) {
  const h = [], p = [];
  picks.forEach(pick => {
    const pr = lookup(pick.name);
    if (pr) (pr.type === 'hitter' ? h : p).push(pr);
  });
  const tPA = h.reduce((s,x) => s+(x.PA||0), 0);
  const tIP = p.reduce((s,x) => s+(x.IP||0), 0);
  return {
    BA: tPA>0 ? h.reduce((s,x)=>s+x.AVG*(x.PA||0),0)/tPA : 0,
    HR: h.reduce((s,x)=>s+(x.HR||0),0),
    RBI: h.reduce((s,x)=>s+(x.RBI||0),0),
    SB: h.reduce((s,x)=>s+(x.SB||0),0),
    ERA: tIP>0 ? p.reduce((s,x)=>s+x.ERA*(x.IP||0),0)/tIP : 0,
    W: p.reduce((s,x)=>s+(x.W||0),0),
    SV: p.reduce((s,x)=>s+(x.SV||0),0),
    WHIP: tIP>0 ? p.reduce((s,x)=>s+x.WHIP*(x.IP||0),0)/tIP : 0,
  };
}

function calcRosterValue(picks) {
  return picks.reduce((s, p) => {
    const pr = lookup(p.name);
    return s + (pr && pr.avgValue ? pr.avgValue : 0);
  }, 0);
}

function calcSurplus(picks) {
  return picks.reduce((s, p) => {
    const pr = lookup(p.name);
    if (!pr || !pr.avgValue) return s;
    return s + (pr.avgValue - (p.cost || 0));
  }, 0);
}

function slotCounts(picks) {
  const c = {}; ALL_SLOTS.forEach(s=>c[s]=0);
  picks.forEach(p=>{ if(c[p.slot]!==undefined) c[p.slot]++; });
  return c;
}

function getOpen(picks) {
  const c = slotCounts(picks);
  return ALL_SLOTS.filter(s=>(c[s]||0)<SLOT_MAX[s]).map(s=>({slot:s,open:SLOT_MAX[s]-(c[s]||0)}));
}

function spent(picks) { return picks.reduce((s,p)=>s+(p.cost||0),0); }
function budgetLeft(picks) { return BUDGET - spent(picks); }

function initRosters() {
  const r={};
  TEAMS.forEach(t => {
    r[t] = (INITIAL_ROSTERS[t]||[])
      .filter(p => p.pos !== 'BN')
      .map(p=>({slot:p.pos,name:p.name,cost:p.cost||1}));
  });
  return r;
}

function loadRosters() {
  try { const d=localStorage.getItem(STORAGE_KEY); if(d) return JSON.parse(d); } catch(e){}
  return initRosters();
}

function saveRosters(r) {
  try { localStorage.setItem(STORAGE_KEY,JSON.stringify(r)); } catch(e){}
}

function sColor(v,tgt,hi) {
  if (!v) return '#999';
  const pct = hi ? v/tgt : tgt/v;
  return pct>=0.95 ? '#2d8a4e' : pct>=0.80 ? '#e68c17' : '#c0392b';
}

function fmt(v,f) {
  if (v===undefined||v===null||(!v&&v!==0)) return '-';
  if (f==='avg'||f==='whip') return (+v).toFixed(3);
  if (f==='era') return (+v).toFixed(2);
  if (f==='val') return (+v)>0 ? `$${Math.round(+v)}` : `-$${Math.abs(Math.round(+v))}`;
  return Math.round(v)||0;
}

const CATS = [
  {k:'BA',f:'avg',hi:true},{k:'HR',f:'int',hi:true},
  {k:'RBI',f:'int',hi:true},{k:'SB',f:'int',hi:true},
  {k:'ERA',f:'era',hi:false},{k:'W',f:'int',hi:true},
  {k:'SV',f:'int',hi:true},{k:'WHIP',f:'whip',hi:false},
];

// ===== DASHBOARD =====
function Dashboard({rosters, onTeamClick}) {
  const data = useMemo(()=>TEAMS.map(t=>{
    const picks=rosters[t]||[];
    return {
      t, stats:calcStats(picks),
      budget:budgetLeft(picks),
      picks:picks.length,
      open:getOpen(picks),
      rosterVal:calcRosterValue(picks),
      surplus:calcSurplus(picks),
    };
  }),[rosters]);

  const ranks = useMemo(()=>{
    const r={};
    CATS.forEach(({k,hi})=>{
      const vals=data.map((d,i)=>({i,v:d.stats[k]||0}));
      vals.sort((a,b)=>hi?b.v-a.v:a.v-b.v);
      r[k]={};
      vals.forEach((v,rk)=>r[k][TEAMS[v.i]]=rk+1);
    });
    // rank by surplus too
    const sv=[...data].sort((a,b)=>b.surplus-a.surplus);
    r['surplus']={};
    sv.forEach((d,i)=>r['surplus'][d.t]=i+1);
    return r;
  },[data]);

  return (
    <div className="page">
      <div className="targets-bar">
        <span className="targets-label">2026 Targets:</span>
        {Object.entries(TARGETS).map(([k,v])=>(
          <div key={k} className="target-chip">
            <span className="tc-key">{k}</span>
            <span className="tc-val">{k==='BA'||k==='WHIP'?v.toFixed(3):k==='ERA'?v.toFixed(2):v}</span>
          </div>
        ))}
      </div>
      <div className="table-scroll">
        <table className="lt">
          <thead>
            <tr>
              <th className="th-l" style={{minWidth:170}}>Team</th>
              <th>$Left</th>
              <th>Picks</th>
              <th title="Sum of avg projected values for all drafted players">RstVal</th>
              <th title="Total projected value minus total spent (positive = value)">Surplus</th>
              <th style={{minWidth:100}}>Needs</th>
              {CATS.map(c=><th key={c.k}>{c.k}</th>)}
            </tr>
          </thead>
          <tbody>
            {data.map(({t,stats,budget,picks,open,rosterVal,surplus})=>{
              const isMe=t===MY_TEAM;
              const activeOpen=open;
              const surpRk=ranks['surplus'][t];
              return (
                <tr key={t} className={`lr ${isMe?'lr-me':''}`} onClick={()=>onTeamClick(t)}>
                  <td className="td-l">{isMe&&<span className="star">★</span>}{t}</td>
                  <td className={budget<30?'bud-low':''}>${budget}</td>
                  <td style={{color:'#666'}}>{picks}/23</td>
                  <td style={{fontWeight:700,color:'#1A3A5C'}}>${Math.round(rosterVal)}</td>
                  <td>
                    <span className={surplus>0?'surplus-pos':surplus<0?'surplus-neg':'surplus-neu'}>
                      {surplus>0?'+':''}{Math.round(surplus)}
                    </span>
                    <span className="rk" style={{color:surpRk<=3?'#2d8a4e':surpRk<=6?'#2E6DA4':surpRk<=9?'#e68c17':'#c0392b'}}>#{surpRk}</span>
                  </td>
                  <td>
                    {activeOpen.length===0
                      ? <span className="full">✓ Full</span>
                      : activeOpen.slice(0,4).map(({slot,open})=>(
                          <span key={slot} className="need-tag">{open>1?`${open}·`:''}{slot}</span>
                        ))
                    }
                  </td>
                  {CATS.map(({k,f,hi})=>{
                    const v=stats[k]; const rk=ranks[k][t];
                    const color=v?sColor(v,TARGETS[k],hi):'#bbb';
                    const rkColor=rk<=3?'#2d8a4e':rk<=6?'#2E6DA4':rk<=9?'#e68c17':'#c0392b';
                    return (
                      <td key={k} className="td-stat">
                        <span style={{color,fontWeight:rk<=3?700:400}}>{fmt(v,f)}</span>
                        {v>0&&<span className="rk" style={{color:rkColor}}>#{rk}</span>}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <p className="table-hint">Click any row · RstVal = sum of avg projected values · Surplus = projected value minus auction spend</p>
    </div>
  );
}

// ===== ADD PICK =====
function AddPick({rosters, onAdd}) {
  const [team, setTeam] = useState(MY_TEAM);
  const [query, setQuery] = useState('');
  const [sel, setSel] = useState(null);
  const [slot, setSlot] = useState('');
  const [cost, setCost] = useState('');
  const [drop, setDrop] = useState(false);
  const [msg, setMsg] = useState(null);
  const wrapRef = useRef(null);

  const drafted = useMemo(()=>{
    const s=new Set();
    Object.values(rosters).forEach(ps=>ps.forEach(p=>s.add(norm(p.name))));
    return s;
  },[rosters]);

  const results = useMemo(()=>{
    if(!query||query.length<2) return [];
    const n=norm(query);
    return ALL_PLAYERS.filter(p=>!drafted.has(norm(p.name))&&norm(p.name).includes(n))
      .sort((a,b)=>a.ADP-b.ADP).slice(0,10);
  },[query,drafted]);

  const avSlots = useMemo(()=>{
    if(!sel) return [];
    const c=slotCounts(rosters[team]||[]);
    const elig=sel.type==='pitcher'?PITCHER_SLOTS:HITTER_SLOTS;
    return elig.filter(s=>(c[s]||0)<SLOT_MAX[s]);
  },[sel,team,rosters]);

  useEffect(()=>{
    if(avSlots.length>0&&!avSlots.includes(slot)) setSlot(avSlots[0]);
    else if(avSlots.length===0) setSlot('');
  },[avSlots]);

  useEffect(()=>{
    const h=e=>{if(wrapRef.current&&!wrapRef.current.contains(e.target))setDrop(false);};
    document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[]);

  // Auto-suggest bid = avgValue or keeperCost
  useEffect(()=>{
    if(sel&&!cost){
      const suggest = sel.keeperCost || (sel.avgValue ? Math.max(1,Math.round(sel.avgValue)) : '');
      if(suggest) setCost(String(suggest));
    }
  },[sel]);

  const submit=()=>{
    if(!sel||!slot||!cost){setMsg({t:'err',tx:'Please fill in all fields'});return;}
    const c=parseInt(cost);
    if(isNaN(c)||c<1){setMsg({t:'err',tx:'Cost must be at least $1'});return;}
    const budget=budgetLeft(rosters[team]||[]);
    if(c>budget){setMsg({t:'err',tx:`Exceeds ${team}'s budget ($${budget} left)`});return;}
    if((rosters[team]||[]).find(p=>norm(p.name)===norm(sel.name))){
      setMsg({t:'err',tx:`${sel.name} is already on ${team}`});return;
    }
    onAdd(team,slot,sel.name,c);
    setMsg({t:'ok',tx:`✓ ${sel.name} → ${team} [${slot}] for $${c}${sel.avgValue?` · Proj value $${Math.round(sel.avgValue)} · Surplus ${c<=sel.avgValue?'+':''}${Math.round(sel.avgValue-c)}`:''}`});
    setQuery('');setSel(null);setCost('');setSlot('');
    setTimeout(()=>setMsg(null),6000);
  };

  const picks=rosters[team]||[];
  const budget=budgetLeft(picks);

  const valColor=(av,cost)=>{
    if(!av||!cost) return '#888';
    const s=av-cost;
    return s>5?'#2d8a4e':s>0?'#e68c17':'#c0392b';
  };

  return (
    <div className="page addpick-page">
      <h2 className="page-title">➕ Add Draft Pick</h2>
      {msg&&<div className={`msg msg-${msg.t}`}>{msg.tx}</div>}
      <div className="addpick-grid">
        <div className="fg">
          <label>Team</label>
          <select value={team} onChange={e=>{setTeam(e.target.value);setSlot('');}}>
            {TEAMS.map(t=><option key={t} value={t}>{t===MY_TEAM?'★ ':''}{t}</option>)}
          </select>
          <div className="field-hint">${budget} remaining · {picks.length}/23 picks · {getOpen(picks).reduce((a,b)=>a+b.open,0)} spots left</div>
        </div>

        <div className="fg search-fg" ref={wrapRef}>
          <label>Player Name</label>
          <input type="text" value={query} placeholder="Start typing..."
            onChange={e=>{setQuery(e.target.value);setSel(null);setCost('');setDrop(true);}}
            onFocus={()=>setDrop(true)}
            style={{borderColor:sel?'#2d8a4e':undefined,background:sel?'#f0fff4':undefined}}
          />
          {drop&&results.length>0&&(
            <ul className="search-drop">
              {results.map(p=>{
                const surplus=p.avgValue?(p.avgValue-(p.keeperCost||0)):null;
                const vc=p.avgValue?(p.avgValue>30?'#2d8a4e':p.avgValue>15?'#2E6DA4':'#555'):'#888';
                return (
                  <li key={p.name} onClick={()=>{setSel(p);setQuery(p.name);setDrop(false);}}>
                    <span className={`type-pip ${p.type}`}>{p.type==='hitter'?'H':'P'}</span>
                    <span className="res-name">{p.name}</span>
                    <span className="res-team">{p.mlbTeam}</span>
                    {p.avgValue&&<span className="res-val" style={{color:vc}}>${Math.round(p.avgValue)}</span>}
                    <span className="res-adp" style={{color:'#999'}}>ADP {p.ADP<999?p.ADP:'-'}</span>
                  </li>
                );
              })}
            </ul>
          )}
        </div>

        <div className="fg">
          <label>Roster Slot</label>
          <select value={slot} onChange={e=>setSlot(e.target.value)} disabled={!sel}>
            {!sel&&<option value="">Select player first</option>}
            {avSlots.map(s=><option key={s} value={s}>{s}</option>)}
            {sel&&avSlots.length===0&&<option value="">No open slots</option>}
          </select>
        </div>

        <div className="fg">
          <label>Winning Bid {sel&&sel.avgValue&&<span style={{color:'#666',fontWeight:400,textTransform:'none'}}>— Proj: ${Math.round(sel.avgValue)}{sel.keeperCost?` (Keeper: $${sel.keeperCost})`:''}</span>}</label>
          <div className="cost-wrap">
            <span className="dollar">$</span>
            <input type="number" className="cost-inp" value={cost} min="1" max={budget}
              onChange={e=>setCost(e.target.value)} placeholder="0"
              style={{color:sel&&cost&&sel.avgValue?valColor(sel.avgValue,parseInt(cost)):undefined}}
            />
          </div>
          {sel&&cost&&sel.avgValue&&(()=>{
            const s=sel.avgValue-parseInt(cost);
            return <div className="field-hint" style={{color:s>0?'#2d8a4e':'#c0392b',fontWeight:600}}>
              Surplus: {s>0?'+':''}{Math.round(s)} vs projected value
            </div>;
          })()}
        </div>

        <button onClick={submit} className="add-btn" disabled={!sel||!slot||!cost}>
          Add Pick ↵
        </button>
      </div>

      {sel&&(
        <div className="proj-card">
          <div className="proj-head">
            <span className="proj-name">{sel.name}</span>
            <span className="proj-mlb">{sel.mlbTeam}</span>
            <span className={`proj-type ${sel.type}`}>{sel.type==='hitter'?'HITTER':'PITCHER'}{sel.role?` · ${sel.role}`:''}</span>
            {sel.avgValue&&(
              <div className={`val-badge ${sel.keeperCost&&sel.keeperCost<sel.avgValue?'':'val-badge-warn'}`} style={{marginLeft:'auto'}}>
                <div>
                  <div className="val-badge-label">Proj Value</div>
                  <div className="val-badge-num">${Math.round(sel.avgValue)}</div>
                </div>
                {sel.keeperCost&&<div>
                  <div className="val-badge-label">Keeper</div>
                  <div className="val-badge-kp" style={{fontSize:14,fontWeight:700}}>${sel.keeperCost}</div>
                </div>}
              </div>
            )}
          </div>
          <div className="proj-stats">
            {(sel.type==='hitter'
              ? [{l:'PA',v:sel.PA},{l:'AVG',v:sel.AVG.toFixed(3)},{l:'HR',v:sel.HR},{l:'RBI',v:sel.RBI},{l:'SB',v:sel.SB}]
              : [{l:'IP',v:sel.IP},{l:'ERA',v:sel.ERA.toFixed(2)},{l:'WHIP',v:sel.WHIP.toFixed(3)},{l:'W',v:sel.W},{l:'SV',v:sel.SV},{l:'SO',v:sel.SO}]
            ).map(({l,v})=>(
              <div key={l} className="ps"><span className="ps-l">{l}</span><strong className="ps-v">{v}</strong></div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ===== TEAM MODAL =====
function TeamModal({team,picks,onClose,onRemove}) {
  const stats=calcStats(picks);
  const budget=budgetLeft(picks);
  const open=getOpen(picks);
  const isMe=team===MY_TEAM;
  const totalVal=calcRosterValue(picks);
  const totalSurplus=calcSurplus(picks);
  const hitters=picks.filter(p=>{const pr=lookup(p.name);return !pr||pr.type==='hitter';});
  const pitchers=picks.filter(p=>{const pr=lookup(p.name);return pr&&pr.type==='pitcher';});

  const valFmt=(v)=>v?`$${Math.round(v)}`:'-';
  const surFmt=(av,cost)=>{
    if(!av) return '-';
    const s=av-cost;
    return {txt:(s>0?'+':'')+Math.round(s), cls:s>5?'val-pos':s>0?'val-pos':s===0?'val-neu':'val-neg'};
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-hdr" style={{background:isMe?'#8B6914':'#1A3A5C'}}>
          <h2>{isMe?'★ ':''}{team}</h2>
          <div className="modal-meta">
            <span className={`mbud ${budget<30?'mbud-low':''}`}>${budget} left</span>
            <span className="mpicks">{picks.length}/23 picks</span>
            <span className="mpicks" style={{background:'rgba(255,255,255,.25)'}}>RstVal: ${Math.round(totalVal)}</span>
            <span className="mpicks" style={{background:totalSurplus>0?'rgba(45,138,78,.5)':'rgba(192,57,43,.4)'}}>
              Surplus: {totalSurplus>0?'+':''}{Math.round(totalSurplus)}
            </span>
          </div>
          <button className="close-x" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="stat-grid">
            {CATS.map(({k,f,hi})=>{
              const v=stats[k]; const tgt=TARGETS[k];
              const color=v?sColor(v,tgt,hi):'#ccc';
              const pct=v?(hi?v/tgt:tgt/v):0;
              return (
                <div key={k} className="sc">
                  <div className="sc-cat">{k}</div>
                  <div className="sc-val" style={{color}}>{fmt(v,f)}</div>
                  <div className="sc-tgt">/{f==='avg'||f==='whip'?tgt.toFixed(3):f==='era'?tgt.toFixed(2):tgt}</div>
                  <div className="sc-bar-bg"><div className="sc-bar-fg" style={{width:`${Math.min(100,pct*100)}%`,background:color}}/></div>
                </div>
              );
            })}
          </div>

          {open.length>0&&(
            <div className="open-bar">
              <span className="ob-label">Still needed: </span>
              {open.map(({slot,open})=>(
                <span key={slot} className="ob-chip ob-active">
                  {open>1?`${open}× `:''}{slot}
                </span>
              ))}
            </div>
          )}

          <h4 className="rt-head">Hitters ({hitters.length})</h4>
          <div className="table-scroll">
            <table className="rt">
              <thead><tr>
                <th>Slot</th><th className="th-l">Player</th><th>$Paid</th>
                <th title="Avg projected auction value">ProjVal</th>
                <th title="Value minus cost">Surplus</th>
                <th>PA</th><th>AVG</th><th>HR</th><th>RBI</th><th>SB</th><th></th>
              </tr></thead>
              <tbody>
                {hitters.length===0&&<tr className="empty-row"><td colSpan="11">No hitters drafted yet</td></tr>}
                {hitters.map((p,i)=>{
                  const pr=lookup(p.name);
                  const sur=pr?surFmt(pr.avgValue,p.cost):{txt:'-',cls:'val-neu'};
                  return (
                    <tr key={i} className={i%2?'tr-odd':'tr-even'}>
                      <td><span className="pb">{p.slot}</span></td>
                      <td className="td-pn">
                        {p.name}
                        {pr?.keeperCost&&<span className="kp-tag">K${pr.keeperCost}</span>}
                        {!pr&&<span style={{color:'#e68c17'}} title="Not in projections"> ⚠</span>}
                      </td>
                      <td><strong>${p.cost}</strong></td>
                      <td className="val-cell val-pos">{pr&&pr.avgValue?`$${Math.round(pr.avgValue)}`:'-'}</td>
                      <td><span className={`val-cell ${sur.cls}`}>{sur.txt}</span></td>
                      <td>{pr?pr.PA:'-'}</td><td>{pr?pr.AVG.toFixed(3):'-'}</td>
                      <td>{pr?pr.HR:'-'}</td><td>{pr?pr.RBI:'-'}</td><td>{pr?pr.SB:'-'}</td>
                      <td><button className="rm" onClick={()=>onRemove(team,p.name)}>✕</button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <h4 className="rt-head" style={{marginTop:'14px'}}>Pitchers ({pitchers.length})</h4>
          <div className="table-scroll">
            <table className="rt">
              <thead><tr>
                <th>Slot</th><th className="th-l">Player</th><th>$Paid</th>
                <th title="Avg projected auction value">ProjVal</th>
                <th title="Value minus cost">Surplus</th>
                <th>IP</th><th>ERA</th><th>WHIP</th><th>W</th><th>SV</th><th></th>
              </tr></thead>
              <tbody>
                {pitchers.length===0&&<tr className="empty-row"><td colSpan="11">No pitchers drafted yet</td></tr>}
                {pitchers.map((p,i)=>{
                  const pr=lookup(p.name);
                  const sur=pr?surFmt(pr.avgValue,p.cost):{txt:'-',cls:'val-neu'};
                  return (
                    <tr key={i} className={i%2?'tr-odd':'tr-even'}>
                      <td><span className="pb p">{p.slot}</span></td>
                      <td className="td-pn">
                        {p.name}
                        {pr?.keeperCost&&<span className="kp-tag">K${pr.keeperCost}</span>}
                        {!pr&&<span style={{color:'#e68c17'}} title="Not in projections"> ⚠</span>}
                      </td>
                      <td><strong>${p.cost}</strong></td>
                      <td className="val-cell val-pos">{pr&&pr.avgValue?`$${Math.round(pr.avgValue)}`:'-'}</td>
                      <td><span className={`val-cell ${sur.cls}`}>{sur.txt}</span></td>
                      <td>{pr?pr.IP:'-'}</td><td>{pr?pr.ERA.toFixed(2):'-'}</td>
                      <td>{pr?pr.WHIP.toFixed(3):'-'}</td><td>{pr?pr.W:'-'}</td><td>{pr?pr.SV:'-'}</td>
                      <td><button className="rm" onClick={()=>onRemove(team,p.name)}>✕</button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

// ===== AVAILABLE =====
function Available({rosters}) {
  const [type, setType] = useState('hitter');
  const [sortBy, setSortBy] = useState('avgValue');
  const [nameFilter, setNameFilter] = useState('');

  const drafted=useMemo(()=>{
    const s=new Set();
    Object.values(rosters).forEach(ps=>ps.forEach(p=>s.add(norm(p.name))));
    return s;
  },[rosters]);

  const avail=useMemo(()=>{
    const pool=type==='hitter'?HITTERS:PITCHERS;
    let filtered=pool.filter(p=>!drafted.has(norm(p.name))&&p.name&&p.name!=='nan');
    if(nameFilter) filtered=filtered.filter(p=>norm(p.name).includes(norm(nameFilter)));
    return filtered.sort((a,b)=>{
      if(sortBy==='ADP') return a.ADP-b.ADP;
      if(sortBy==='avgValue') return (b.avgValue||0)-(a.avgValue||0);
      if(['HR','RBI','SB','W','SV','SO'].includes(sortBy)) return (b[sortBy]||0)-(a[sortBy]||0);
      if(sortBy==='AVG') return (b.AVG||0)-(a.AVG||0);
      if(sortBy==='ERA') return (a.ERA||99)-(b.ERA||99);
      if(sortBy==='WHIP') return (a.WHIP||99)-(b.WHIP||99);
      return 0;
    });
  },[type,sortBy,drafted,nameFilter]);

  const hCt=HITTERS.filter(p=>!drafted.has(norm(p.name))&&p.name&&p.name!=='nan').length;
  const pCt=PITCHERS.filter(p=>!drafted.has(norm(p.name))&&p.name&&p.name!=='nan').length;

  const SH=({col,label})=>(
    <th className={`sh ${sortBy===col?'sh-a':''}`} onClick={()=>setSortBy(col)}>
      {label||col}{sortBy===col?' ↓':''}
    </th>
  );

  const valColor=(v)=> v>30?'#2d8a4e':v>15?'#2E6DA4':v>0?'#555':'#c0392b';

  return (
    <div className="page">
      <div className="avail-bar">
        <div className="type-tog">
          <button className={type==='hitter'?'tt-a':''} onClick={()=>{setType('hitter');setSortBy('avgValue');}}>
            Hitters <span className="ct">{hCt}</span>
          </button>
          <button className={type==='pitcher'?'tt-a':''} onClick={()=>{setType('pitcher');setSortBy('avgValue');}}>
            Pitchers <span className="ct">{pCt}</span>
          </button>
        </div>
        <input className="name-filter" placeholder="Filter by name…" value={nameFilter} onChange={e=>setNameFilter(e.target.value)}/>
        <span className="avail-ct">{avail.length} available</span>
      </div>
      <div className="table-scroll">
        <table className="at">
          <thead>
            <tr>
              <SH col="ADP"/>
              <th className="th-l">Player</th>
              <th>MLB</th>
              {type==='pitcher'&&<th>Role</th>}
              <SH col="avgValue" label="ProjVal"/>
              {type==='hitter'
                ? <><SH col="AVG"/><SH col="HR"/><SH col="RBI"/><SH col="SB"/></>
                : <><SH col="ERA"/><SH col="WHIP"/><SH col="W"/><SH col="SV"/><SH col="SO"/></>
              }
            </tr>
          </thead>
          <tbody>
            {avail.slice(0,250).map((p,i)=>(
              <tr key={p.name} className={i%2?'tr-odd':'tr-even'}>
                <td className="td-adp">{p.ADP<999?p.ADP:'-'}</td>
                <td className="td-pn">
                  {p.name}
                  {p.keeperCost&&<span className="kp-tag">K${p.keeperCost}</span>}
                </td>
                <td>{p.mlbTeam}</td>
                {type==='pitcher'&&<td><span className={`role-b ${p.role}`}>{p.role}</span></td>}
                <td className="td-pval" style={{color:p.avgValue?valColor(p.avgValue):'#bbb'}}>
                  {p.avgValue?`$${Math.round(p.avgValue)}`:'-'}
                </td>
                {type==='hitter'
                  ? <><td>{p.AVG.toFixed(3)}</td><td>{p.HR}</td><td>{p.RBI}</td><td>{p.SB}</td></>
                  : <><td>{p.ERA.toFixed(2)}</td><td>{p.WHIP.toFixed(3)}</td><td>{p.W}</td><td>{p.SV}</td><td>{p.SO}</td></>
                }
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ===== APP =====
function App() {
  const [rosters, setRosters] = useState(loadRosters);
  const [tab, setTab] = useState('dashboard');
  const [detail, setDetail] = useState(null);

  useEffect(()=>saveRosters(rosters),[rosters]);

  const addPick=useCallback((team,slot,name,cost)=>{
    setRosters(prev=>({...prev,[team]:[...(prev[team]||[]),{slot,name,cost}]}));
  },[]);

  const removePick=useCallback((team,name)=>{
    setRosters(prev=>({...prev,[team]:(prev[team]||[]).filter(p=>p.name!==name)}));
  },[]);

  const reset=()=>{
    if(confirm('Reset all rosters to the pre-draft spreadsheet data?\nThis cannot be undone.'))
      setRosters(initRosters());
  };

  const TABS=[['dashboard','📊','Dashboard'],['addpick','➕','Add Pick'],['teams','👥','All Teams'],['available','🔍','Available']];

  return (
    <div className="app">
      <header className="app-hdr">
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span className="app-emoji">⚾</span>
          <div>
            <div className="app-name">AL Fantasy Draft 2026</div>
            <div className="app-sub">Auction · $260 · 12 Teams · 9 Categories</div>
          </div>
        </div>
        <nav className="app-nav">
          {TABS.map(([id,em,lbl])=>(
            <button key={id} className={`nav-b ${tab===id?'nav-a':''}`} onClick={()=>setTab(id)}>
              {em} {lbl}
            </button>
          ))}
        </nav>
        <button className="reset-b" onClick={reset} title="Reset to spreadsheet data">↺ Reset</button>
      </header>
      <main className="app-main">
        {tab==='dashboard'&&<Dashboard rosters={rosters} onTeamClick={setDetail}/>}
        {tab==='addpick'&&<AddPick rosters={rosters} onAdd={addPick}/>}
        {tab==='teams'&&<TeamsGrid rosters={rosters} onTeamClick={setDetail}/>}
        {tab==='available'&&<Available rosters={rosters}/>}
      </main>
      {detail&&(
        <TeamModal team={detail} picks={rosters[detail]||[]} onClose={()=>setDetail(null)} onRemove={removePick}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
